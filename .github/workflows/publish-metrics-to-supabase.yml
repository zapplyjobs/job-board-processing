name: publish-metrics-to-supabase

# Auto-publishes the 8 pipeline metric blobs to the Supabase pipeline_metrics table (which the
# local zjp-dashboard reads), keeping the dashboard fresh without a manual step.
#
# SECURITY: this workflow does NOT hold the sensitive SUPABASE_SERVICE_ROLE_KEY. It reads the
# metric data via git checkout (NOT raw-GitHub), then POSTs the blobs to a Supabase Edge Function
# (supabase/functions/publish-metrics) that holds the service key in Supabase's own secret store.
# GitHub Actions only needs PUBLISH_SECRET (a lightweight shared secret).
# Direction: projects/zjp/docs/dash/DASH_DIRECTION.md
#
# REQUIRED (add in job-board-processing Settings → Secrets → Actions):
#   PUBLISH_SECRET  — the same random string set as the function's PUBLISH_SECRET in Supabase.
# AND the Edge Function must be deployed + its secrets set (see supabase/functions/publish-metrics/index.ts).

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout job-board-processing (the publish script)
        uses: actions/checkout@v4

      - name: Checkout jobs-data-2026 (the metric data — public repo)
        uses: actions/checkout@v4
        with:
          repository: zapplyjobs/jobs-data-2026
          path: jobs-data-2026

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: POST metric blobs to the Supabase Edge Function
        run: node lib/publish-metrics-to-edge.js --data-dir jobs-data-2026/.github/data
        env:
          EDGE_FUNCTION_URL: https://xxmhgagpbxjflajoaahy.supabase.co/functions/v1/publish-metrics
          PUBLISH_SECRET: ${{ secrets.PUBLISH_SECRET }}
